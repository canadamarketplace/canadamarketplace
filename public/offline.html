<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#dc2626" />
  <title>Offline — Canada Marketplace</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #f5f5f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .container {
      max-width: 420px;
    }
    .maple-leaf {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(220, 38, 38, 0.3);
    }
    .maple-leaf svg {
      width: 44px;
      height: 44px;
      fill: white;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f5f5f4;
      margin-bottom: 8px;
    }
    p {
      font-size: 1rem;
      color: #a8a29e;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .try-again {
      display: inline-block;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-decoration: none;
    }
    .try-again:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(220, 38, 38, 0.4);
    }
    .try-again:active {
      transform: translateY(0);
    }
    .brand {
      margin-top: 48px;
      font-size: 0.875rem;
      color: #57534e;
    }
    .brand span {
      color: #dc2626;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="maple-leaf">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22l1-2.3A4.49 4.49 0 0 0 8 20c4 0 4-4 8-4 1.5 0 2 .5 2 .5s-.32-4.5-1-7.5c-.35-1.5-1-2-1-2h-1s-.5-.5-.5-1.5c0-1 .5-1.5.5-1.5s-1-1-2-1c-1 0-2 1-2 1S11 3 10 3c-1 0-2 1-2 1s-.5-.5-1.5-.5S5 3.5 5 3.5s-.5.5-.5 1.5.5 1.5.5 1.5h-1s-.65.5-1 2c-.68 3-1 7.5-1 7.5s.5-.5 2-.5c4 0 4 4 8 4a4.49 4.49 0 0 0 1.29-.3L15 22l1.71-.66C14.9 16.17 12 10 17 8z"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network settings and try again.</p>
    <a href="/" class="try-again">Try Again</a>
    <div class="brand">
      🍁 <span>Canada Marketplace</span>
    </div>
  </div>
</body>
</html>
